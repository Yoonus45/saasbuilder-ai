spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/saasbuilder
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.servlet.context-path=/

# JWT Configuration
jwt.secret=dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256
jwt.expiration.hours=24
jwt.refresh.expiration.days=30

# OpenAI (optional)
openai.api-key=
openai.model=gpt-4o-mini
openai.endpoint=https://api.openai.com/v1/chat/completions

# Stripe (optional)
stripe.api-key=
stripe.webhook-secret=

# Logging
logging.level.root=INFO
logging.level.com.yoonus.backend=DEBUG
logging.level.org.springframework.security=DEBUG
