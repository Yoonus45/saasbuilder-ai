spring.application.name=backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/saasbuilder}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.servlet.context-path=/

# JWT Configuration
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh.expiration.days=30

# OpenRouter (optional)
openrouter.api-key=
openrouter.model=deepseek/deepseek-chat-v3-0324
openrouter.endpoint=https://api.openrouter.ai/v1/chat/completions
openrouter.timeout.seconds=30

# Stripe (optional)
stripe.api-key=
stripe.webhook-secret=

# Logging
logging.level.root=INFO
logging.level.com.yoonus.backend=DEBUG
logging.level.org.springframework.security=DEBUG
