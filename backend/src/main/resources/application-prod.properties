spring.application.name=backend

# Database (from env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.servlet.context-path=/
server.ssl.enabled=false

# JWT Configuration (from env vars)
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# OpenRouter (from env vars)
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:deepseek/deepseek-chat-v3-0324}
openrouter.endpoint=${OPENROUTER_ENDPOINT:https://openrouter.ai/api/v1/chat/completions}
openrouter.timeout.seconds=${OPENROUTER_TIMEOUT_SECONDS:30}

# Stripe (from env vars)
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.root=WARN
logging.level.com.yoonus.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
