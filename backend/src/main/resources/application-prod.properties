spring.application.name=backend

# Database (from env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/saasbuilder}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.servlet.context-path=/
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH:/etc/ssl/keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# JWT Configuration (from env vars)
jwt.secret=${JWT_SECRET:}
jwt.expiration.hours=${JWT_EXPIRATION_HOURS:24}
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# OpenAI (from env vars)
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.endpoint=https://api.openai.com/v1/chat/completions

# Stripe (from env vars)
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.root=WARN
logging.level.com.yoonus.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
