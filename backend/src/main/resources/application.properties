spring.application.name=backend

# Load optional local environment files for development
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties]

# Use environment-specific profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database (from env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/saasbuilder}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

# JWT Configuration (from env vars)
jwt.secret=${JWT_SECRET:dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256}
jwt.expiration.hours=${JWT_EXPIRATION_HOURS:24}
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# OpenRouter (from env vars)
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:deepseek/deepseek-chat-v3-0324}
openrouter.endpoint=${OPENROUTER_ENDPOINT:https://openrouter.ai/api/v1/chat/completions}
openrouter.timeout.seconds=${OPENROUTER_TIMEOUT_SECONDS:30}

# Stripe (from env vars)
stripe.api-key=${STRIPE_API_KEY:}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.root=INFO
logging.level.com.yoonus.backend=DEBUG