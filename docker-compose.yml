version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: saasbuilder-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: "saasbuilder"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saasbuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: saasbuilder-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: "dev"

      DB_URL: "jdbc:postgresql://postgres:5432/saasbuilder"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"

      JWT_SECRET: "bW9ja3NlY3JldGtleTEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      JWT_EXPIRATION_MS: "86400000"
      JWT_REFRESH_EXPIRATION_DAYS: "30"

      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_MODEL: "deepseek/deepseek-chat-v3-0324"
      OPENROUTER_ENDPOINT: "https://openrouter.ai/api/v1/chat/completions"
      OPENROUTER_TIMEOUT_SECONDS: "30"

      CORS_ALLOWED_ORIGINS: "http://localhost:3000"

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: saasbuilder-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:
  postgres-data: